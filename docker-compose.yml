services:
  segment-conflict-live:
    build: .
    container_name: segment-conflict-live
    ports:
      - "0.0.0.0:18088:8080"
    volumes:
      # On Linux, pre-create ./SCR and chown it to UID 10001 because the
      # container runs as a non-root user.
      - ./SCR:/app/SCR
    restart: unless-stopped
