name: Docker Image CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  id-token: write
  attestations: write

env:
  IMAGE_NAME: hkarhani/scrm
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Require Docker Hub credentials for push builds
        if: github.event_name == 'push' && (env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '')
        run: |
          echo "Docker Hub publishing is required so hkarhani/scrm:latest receives SBOM and provenance attestations." >&2
          echo "Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN as GitHub repository secrets, then rerun this workflow." >&2
          exit 1

      - name: Docker Hub login
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build image with SBOM and provenance
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
